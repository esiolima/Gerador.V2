<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=700, initial-scale=1.0" />
<title>Soma</title>

<style>
@font-face {
  font-family: 'Segoe UI';
  src: url('../fonts/Segoe UI.ttf') format('truetype');
  font-weight: 400;
}
@font-face {
  font-family: 'Segoe UI';
  src: url('../fonts/Segoe UI Bold.ttf') format('truetype');
  font-weight: 700;
}
@font-face {
  font-family: 'Segoe UI';
  src: url('../fonts/segoe-ui-black.ttf') format('truetype');
  font-weight: 900;
}

* {
  text-transform: uppercase;
  color: #2b4474;
  box-sizing: border-box;
  font-family: 'Segoe UI', Arial, sans-serif;
}

body {
  margin: 0;
  width: 700px;
  height: 1058px;
  background: transparent;
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  width: 700px;
  height: 1058px;
  padding: 60px 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: #ffffff;
  overflow: hidden;
  position: relative;
}

/* ===== BLOCO CENTRAL ===== */
.bloco-central {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.valor-container {
  width: 100%;
  height: 600px; /* Aumentado para dar mais espaço à frase principal */
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.valor-texto {
  font-weight: 900;
  font-size: 480px;
  text-align: center;
  white-space: normal;
  word-break: keep-all;
  overflow-wrap: normal;
  line-height: 0.95;
}

/* ===== INFERIOR ===== */
.bloco-inferior {
  margin-top: 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.complemento {
  text-align: center;
  font-size: 32px; /* Um pouco maior que o original para destacar como no print */
  font-weight: 700;
  max-width: 600px;
  line-height: 1.15;
  word-break: break-word;
}

</style>
</head>

<body>

<div class="card">

  <div class="bloco-central">
    <div class="valor-container" id="valor-container">
      <div class="valor-texto" id="valor-texto">
        {{VALOR}}
      </div>
    </div>
  </div>

  <div class="bloco-inferior">
    <div class="complemento">{{COMPLEMENTO}}</div>
  </div>

</div>

<!--
  O ajuste de tamanho de fonte do #valor-texto NÃO é feito aqui.
  Ele é aplicado pelo servidor (server/cardGenerator.ts -> injectFittingHelpers)
  e, no preview, pelo CardGenerator.tsx (runCardFit) -- ambos já usam os mesmos
  parâmetros (max 520px / min 22px). Ter um terceiro script aqui, rodando antes
  da fonte Segoe UI carregar, media o texto errado e gerava tamanhos
  inconsistentes entre o preview e o PDF/PNG final.
-->

</body>
</html>
